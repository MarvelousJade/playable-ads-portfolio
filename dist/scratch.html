/*
 * playable.js — Universal playable-ad lifecycle + CTA/redirect handler.
 *
 * A single build often has to ship across many ad networks, each with its own
 * "open the store" protocol and readiness signals. This module abstracts that
 * so the game code just calls PlayableAd.install() and PlayableAd.onReady().
 *
 * Supported click protocols: MRAID (IAB / ironSource / AppLovin / Vungle /
 * Mintegral), Google AdMob (ExitApi), Meta/Facebook (FbPlayableAd), Unity Ads
 * (install_url macro), AppLovin DAPI, plus a window.open() fallback for preview.
 *
 * Exposes a single global: window.PlayableAd
 */
(function (global) {
  'use strict';

  // ── Store destinations (swap per campaign) ───────────────────────────────
  var CONFIG = {
    iosUrl: 'https://apps.apple.com/app/id000000000',
    androidUrl: 'https://play.google.com/store/apps/details?id=com.example.socialcasino'
  };

  // ── A/B variant selection ─────────────────────────────────────────────────
  // Networks pass variant via query string (?v=b) or an injected global
  // (window.AB_VARIANT, set by the packaging step). Defaults to 'a'.
  function variant() {
    try {
      var m = /[?&]v=([\w-]+)/.exec(global.location.search);

    } catch (e) { return 'a'; }

  function isIOS() {

      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  }

  function storeUrl() {
    return isIOS() ? CONFIG.iosUrl : CONFIG.androidUrl;
  }

  var clickGuard = false;

  function install() {
    if (clickGuard) return;           // debounce rapid double-taps
    clickGuard = true;
    setTimeout(function () { clickGuard = false; }, 700);

    var url = storeUrl();
    track('cta_click');
    try {
      if (typeof mraid !== 'undefined' && mraid.open) {            // MRAID family
        mraid.open(url);
      } else if (typeof FbPlayableAd !== 'undefined') {            // Meta / Facebook
        FbPlayableAd.onCTAClick();
      } else if (global.ExitApi && global.ExitApi.exit) {          // Google AdMob / Ads
        global.ExitApi.exit();
      } else if (global.dapi && global.dapi.openStoreUrl) {        // AppLovin DAPI
        global.dapi.openStoreUrl(url);
      } else if (typeof global.install_url !== 'undefined') {      // Unity Ads macro
        global.open(global.install_url, '_blank');
      } else if (global.mintegral && global.mintegral.openUrl) {   // Mintegral
        global.mintegral.openUrl(url);
      } else {

      }

      } else {

      }
    });
  }

  function onViewableChange(cb) {
    if (typeof mraid === 'undefined' || !mraid.addEventListener) return;
    mraid.addEventListener('viewableChange', cb);
  }

  // a compliant playable must not run or make sound while hidden. This folds
  // MRAID viewability and the Page Visibility API into one signal.
  var paused = false;

      setPaused(document.hidden);

  // Top playables (e.g. Blackout Bingo) show a rotating "X just won Y" strip.
  // Deterministic off the clock so all engines just render the same string.
  var FEED_NAMES = ['Mia', 'Jake', 'Ana', 'Leo', 'Zoe', 'Sam', 'Ivy', 'Max', 'Eva', 'Tom'];

    } catch (e) { /* no-op */ }
  }

    config: CONFIG,

    variant: variant,
    socialFeed: socialFeed,
    track: track,
    isIOS: isIOS,
    storeUrl: storeUrl
  };

<script>/* inlined: game.js */
/*
 * Lucky Scratch — vanilla Canvas playable ad (no framework).
 *
 * The player scratches a foil panel to reveal a 3x3 prize grid. The grid is
 * scripted to contain three matching diamonds, so the scratch always lands a

 * show how small/fast a playable can be when every byte counts.

      bonus: { grid: ['star', 'coin', 'star', 'lemon', 'star', 'bell', 'cherry', 'gem', 'coin'],
               winSymbol: 'star', winAmount: 50000, header: 'BONUS — MATCH 3' }
    },
    b: {
      main:  { grid: ['star', 'cherry', 'lemon', 'bell', 'star', 'coin', 'gem', 'star', 'bell'],
               winSymbol: 'star', winAmount: 50000, header: 'MATCH 3 TO WIN' },
      bonus: { grid: ['gem', 'lemon', 'gem', 'coin', 'bell', 'gem', 'star', 'cherry', 'coin'],

    GRID = cfg.grid; WIN_SYMBOL = cfg.winSymbol; WIN_AMOUNT = cfg.winAmount;

  var state = 'scratch';          // scratch | revealing | win | endcard
  var foilAlpha = 1;

    }
    if (state === 'endcard') { PlayableAd.install(); return; }
    if (state === 'scratch') { scratching = true; last = null; scratchAt(p.x, p.y); }
  }
  function onMove(e) {
    if (!scratching || state !== 'scratch') return;
    e.preventDefault();
    var p = toCanvas(e);
    scratchAt(p.x, p.y);
  }
  function onUp() {
    scratching = false; last = null;
    if (state !== 'scratch') return;
    scratchPct = measureScratch();
    if (scratchPct > 0.5) reveal();
  }

  // ── Reveal → win → end card ─────────────────────────────────────────────────
  function reveal() {
    if (state !== 'scratch') return;
    state = 'revealing';
    PlayableAd.track('scratch_revealed', { round: round });
    var t0 = performance.now();
    (function fade() {
      foilAlpha = Math.max(0, 1 - (performance.now() - t0) / 350);
      if (foilAlpha > 0) requestAnimationFrame(fade);
      else { foilAlpha = 0; win(); }
    })();
  }

  function win() {
    state = 'win';
    SFX.bigWin();
    burstCoins(60);
    addWinning(WIN_AMOUNT);
    totalWon += WIN_AMOUNT;
    if (round === 1) {
      // progression beat: unlock a second, bigger-feeling card before the CTA
      setTimeout(startBonusRound, 1900);
    } else {
      setTimeout(function () { state = 'endcard'; PlayableAd.track('endcard_shown'); }, 1900);
    }
  }

  function startBonusRound() {
    state = 'bonusintro';
    PlayableAd.track('bonus_unlocked');
    SFX.win();
    setTimeout(function () {
      round = 2;
      setRound(V.bonus);
      buildPrize(V.bonus.header);
      buildFoil();
      foilAlpha = 1;
      scratchPct = 0;
      state = 'scratch';
    }, 1700);
  }

  function addWinning(amount) {
    var from = balance, to = balance + amount, t0 = performance.now();
    (function up() {
      var e = Math.min(1, (performance.now() - t0) / 1100);
      balance = Math.floor(from + (to - from) * (1 - Math.pow(1 - e, 3)));
      if (e < 1) requestAnimationFrame(up); else balance = to;
    })();
    for (var i = 0; i < 6; i++) SFX.coin(i * 0.08);
  }

  // ── Particles ───────────────────────────────────────────────────────────────
  function burstCoins(n) {
    for (var i = 0; i < n; i++) {
      particles.push({
        x: W / 2, y: CARD.y + CARD.h / 2,
        vx: (Math.random() - 0.5) * 16, vy: -8 - Math.random() * 12,
        r: 10 + Math.random() * 10, rot: Math.random() * 7, vr: (Math.random() - 0.5) * 0.3, life: 1
      });
    }
  }
  function updateParticles() {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.vy += 0.6; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      if (p.y > H + 40) particles.splice(i, 1);
    }
  }
  function drawCoin(c, x, y, r, rot) {
    if (!IMAGES.coin) return;
    c.save(); c.translate(x, y); c.scale(Math.cos(rot) * 0.5 + 0.6, 1);  // horizontal squash = coin-flip
    c.drawImage(IMAGES.coin, -r, -r, 2 * r, 2 * r);
    c.restore();
  }

  // ── HUD + buttons + end card ────────────────────────────────────────────────
  function drawButton(x, y, w, h, fill, label, sub) {
    roundRect(ctx, x, y - 12, w, h, 28); ctx.fillStyle = '#12702c'; ctx.fill();
    roundRect(ctx, x, y, w, h - 12, 28); ctx.fillStyle = fill; ctx.fill();
    roundRect(ctx, x, y, w, h, 28); ctx.lineWidth = 4; ctx.strokeStyle = '#fff'; ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = '900 ' + Math.floor(h * 0.4) + 'px Arial Black, Arial';
    ctx.fillText(label, x + w / 2, y + h / 2 - (sub ? 8 : 2));
    if (sub) { ctx.font = '400 20px Arial'; ctx.fillStyle = '#d6ffe0'; ctx.fillText(sub, x + w / 2, y + h - 22); }
  }

  function drawHUD() {
    drawCoin(ctx, 130, 96, 24, 0.2);
    ctx.fillStyle = '#ffe27a'; ctx.font = '900 44px Arial Black, Arial';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(balance.toLocaleString(), 168, 96);
    ctx.textAlign = 'center';
    if (state !== 'endcard') {
      ctx.fillStyle = '#ffe27a'; ctx.font = '900 50px Arial Black, Arial';
      ctx.fillText('LUCKY SCRATCH', W / 2, 250);
    }
    // mute
    ctx.font = '38px "Segoe UI Emoji",sans-serif';
    ctx.fillText(muted ? '🔇' : '🔊', W - 60, 96);
  }

  function drawWinHighlight() {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,210,60,' + (0.5 + 0.5 * Math.sin(performance.now() / 150)) + ')';
    ctx.lineWidth = 7;
    for (var k = 0; k < WIN_CELLS.length; k++) {
      var r = cellRect(WIN_CELLS[k]);
      roundRect(ctx, CARD.x + r.x - 4, CARD.y + r.y - 4, r.s + 8, r.s + 8, 18); ctx.stroke();
    }
    ctx.restore();
  }

  function drawEndCard() {
    ctx.fillStyle = 'rgba(5,3,12,0.93)'; ctx.fillRect(0, 0, W, H);
    // solid panel so nothing bleeds through
    roundRect(ctx, 64, 300, W - 128, 760, 30);
    var pg = ctx.createLinearGradient(0, 300, 0, 1060);
    pg.addColorStop(0, '#1d1438'); pg.addColorStop(1, '#0d0a1c');
    ctx.fillStyle = pg; ctx.fill();
    roundRect(ctx, 64, 300, W - 128, 760, 30); ctx.lineWidth = 4; ctx.strokeStyle = '#caa23a'; ctx.stroke();

    ctx.fillStyle = '#ffe27a'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = '900 70px Arial Black, Arial';
    ctx.fillText('LUCKY SCRATCH', W / 2, 392);
    ctx.fillStyle = '#fff'; ctx.font = '400 34px Arial';
    ctx.fillText('Claim your ' + totalWon.toLocaleString() + ' coins!', W / 2, 470);
    if (IMAGES[WIN_SYMBOL]) ctx.drawImage(IMAGES[WIN_SYMBOL], W / 2 - 95, 580, 190, 190);
    drawButton(W / 2 - 220, 905, 440, 124, '#2bd659', 'CLAIM NOW', 'FREE TO INSTALL');
  }

  function drawBonusIntro() {
    ctx.save();
    ctx.fillStyle = 'rgba(5,3,12,0.72)'; ctx.fillRect(0, CARD.y, W, CARD.h);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffd23c'; ctx.font = '900 56px Arial Black, Arial';
    ctx.fillText('BONUS CARD', W / 2, CARD.y + CARD.h / 2 - 40);
    ctx.fillText('UNLOCKED!', W / 2, CARD.y + CARD.h / 2 + 28);
    ctx.fillStyle = '#fff'; ctx.font = '400 28px Arial';
    ctx.fillText('Scratch again for a bigger prize', W / 2, CARD.y + CARD.h / 2 + 96);
    ctx.restore();
  }

  // ── Main loop ───────────────────────────────────────────────────────────────
  function frame(now) {
    // MRAID viewability / page visibility: hold the frame while off-screen
    if (PlayableAd.isPaused()) { requestAnimationFrame(frame); return; }
    ctx.clearRect(0, 0, W, H);
    ctx.drawImage(bg, 0, 0);

    ctx.drawImage(prize, CARD.x, CARD.y);
    if (foilAlpha > 0) { ctx.globalAlpha = foilAlpha; ctx.drawImage(foil, CARD.x, CARD.y); ctx.globalAlpha = 1; }

    if (state === 'win') drawWinHighlight();
    if (state === 'bonusintro') drawBonusIntro();

    updateParticles();
    for (var i = 0; i < particles.length; i++) drawCoin(ctx, particles[i].x, particles[i].y, particles[i].r, particles[i].rot);

    drawHUD();

    if (state === 'scratch') {
      hintT += 0.06;
      ctx.fillStyle = '#ffe27a'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = '900 30px Arial Black, Arial';
      ctx.globalAlpha = 0.6 + 0.4 * Math.sin(hintT);
      ctx.fillText(round === 2 ? 'Scratch the BONUS card!' : 'Scratch to reveal your prize!', W / 2, 1080);
      ctx.globalAlpha = 1;
    }

    hitRegions = [];
    if (state === 'endcard') {
      drawEndCard();
      hitRegions.push({ x: 0, y: 0, w: W, h: H, fn: function () { PlayableAd.install(); } });
    } else {
      // persistent install CTA + social-proof ticker (like top-performing ads)
      drawButton(W - 24 - 150, H - 24 - 54, 150, 54, '#2bd659', 'INSTALL');
      hitRegions.push({ x: W - 24 - 150, y: H - 24 - 54, w: 150, h: 54, fn: function () { PlayableAd.install(); } });
      ctx.fillStyle = 'rgba(201,191,230,0.85)'; ctx.font = '400 20px Arial';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(PlayableAd.socialFeed(), 24, H - 48);
      ctx.textAlign = 'center';
    }
    // mute is always tappable
    hitRegions.push({ x: W - 92, y: 64, w: 64, h: 64, fn: function () { muted = SFX.toggleMuted(); } });

    requestAnimationFrame(frame);
  }

  // ── Boot ────────────────────────────────────────────────────────────────────
  function boot() {
    buildBg(); buildPrize(V.main.header); buildFoil();
    fit(); window.addEventListener('resize', fit);

    stage.addEventListener('mousedown', onDown);
    stage.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    stage.addEventListener('touchstart', onDown, { passive: false });
    stage.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend', onUp);

    PlayableAd.onPauseChange(function (paused) {
      if (paused) SFX.suspend(); else SFX.resume();
    });

    document.getElementById('loader').classList.add('hide');
    PlayableAd.track('game_loaded');
    requestAnimationFrame(frame);
  }

  function fit() {
    var scale = Math.min(window.innerWidth / W, window.innerHeight / H);
    stage.style.width = (W * scale) + 'px';
    stage.style.height = (H * scale) + 'px';
    stage.style.left = ((window.innerWidth - W * scale) / 2) + 'px';
    stage.style.top = ((window.innerHeight - H * scale) / 2) + 'px';
  }

  PlayableAd.onReady(function () {
    loadImages(['cherry', 'lemon', 'bell', 'star', 'gem', 'coin'], boot);
  });
})();

</script>
</body>
